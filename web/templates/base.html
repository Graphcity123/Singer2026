{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}瓜易云音乐{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'web/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <a class="brand" href="{% url 'songlist' %}">🎵 瓜易云音乐</a>
        <a href="{% url 'songlist' %}">歌曲列表</a>
        <a href="{% url 'singerlist' %}">歌手列表</a>
        <a href="{% url 'analysis' %}">数据分析</a>
        <div class="nav-right">
            <form action="{% url 'search' %}" method="get" class="search-form">
                <input type="text" name="q" placeholder="搜索歌曲/歌手/歌词..." value="{{ query }}">
                <button type="submit">搜索</button>
            </form>
            <span class="nav-auth">
                {% if user.is_authenticated %}
                    {% if user.is_superuser %}
                        <a href="{% url 'admin_users' %}">用户管理</a>
                    {% endif %}
                    <a href="{% url 'profile' %}" class="nav-user">{{ user.username }}</a>
                    <a href="{% url 'logout' %}">登出</a>
                {% else %}
                    <a href="{% url 'login' %}">登录</a>
                    <a href="{% url 'register' %}">注册</a>
                {% endif %}
            </span>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
